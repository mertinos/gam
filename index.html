<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #071d35;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: clamp(16px, 4vw, 48px);
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1380px;
    }

    .logo-wrapper img {
      display: block;
      width: 100%;
      max-width: 1380px;
      max-height: calc(100vh - clamp(32px, 8vw, 96px));
      height: auto;
      aspect-ratio: 1380 / 752;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-wrapper">
      <img
        src="GAMai-Logo.jpg"
        alt="Logo"
        width="1380"
        height="752"
        draggable="false"
      />
    </div>
  </main>
</body>
</html>
